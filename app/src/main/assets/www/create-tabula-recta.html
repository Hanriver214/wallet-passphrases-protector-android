<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创建密码表 - 助记词保护器</title>

  <link rel="stylesheet" href="style.css">
  <script src="english-words.js"></script>
  <script src="util.js"></script>
  <script src="crypto-util.js"></script>

</head>
<body>
  <h1>创建密码表 - 助记词保护器</h1>
  
  <p class="caution-grey">【安全提示】 请在禁用插件的隐身窗口使用以下功能</p>

  <p id="before-generate">
    <br>
    点击 <button id="generate-btn">generate</button> 生成新的密码表。
  </p>

  <p id="alert-words-not-safe" class="alert-danger">
    出错，请再次点击 generate 按钮重新生成新的密码表。
  </p>

  <div id="crypto-options" class="after-generate">
    <p><strong>导出选项</strong></p>
    <label><input type="checkbox" id="enable-hash" checked> 启用 SHA-256 完整性校验</label><br>
    <label><input type="checkbox" id="enable-encrypt"> 启用 AES-256 加密</label>
    <div id="password-section" style="display:none; margin-top:8px;">
      <input type="password" id="encrypt-password" placeholder="输入加密密码" style="width:200px;">
      <input type="password" id="encrypt-password-confirm" placeholder="确认加密密码" style="width:200px;">
    </div>
  </div>

  <div class="after-generate">
    <p>点击 <a id="download-btn" href="#" download="mimabiao.txt">download</a> 下载密码表。</p>
    <p>建议下载后用 RAR 设密码打包密码表 (恢复记录设为 100%), 保存在外国网盘。</p>
    <p class="caution-text">【注意！】 一旦遗失密码表，没有任何办法恢复受保护的助记词！</p>
  </div>

  <textarea id="output" rows="12" cols="60" disabled></textarea>

  <div class="after-generate">
    <p><span id="next">Next →</span> <a href="protecting.html">保护助记词</a></p>
  </div>

  <script>
"use strict";

const outputArea = $query("#output");
const beforeGenerate = $query("#before-generate");
const afterGenerate = $queryAll(".after-generate");
const downloadBtn = $query('#download-btn');
const alertWordsNotSafe = $query("#alert-words-not-safe");
const enableEncrypt = $query("#enable-encrypt");
const passwordSection = $query("#password-section");
const cryptoOptions = $query("#crypto-options");

let rawBase64 = "";

enableEncrypt.addEventListener('change', () => {
  passwordSection.style.display = enableEncrypt.checked ? "block" : "none";
});

$query('#generate-btn').addEventListener('click', async event => {
  alertWordsNotSafe.style.display = "none";
  const shuffled = secureShuffle(englishWords);
  if (isSameArrays(englishWords, shuffled)) {
    alertWordsNotSafe.style.display = "block";
    return;
  }
  rawBase64 = btoa(JSON.stringify(shuffled));
  outputArea.value = rawBase64;
  beforeGenerate.style.visibility = "hidden";
  afterGenerate.forEach(node => node.style.display = "block");
  cryptoOptions.style.display = "block";
  const today = getToday();
  downloadBtn.download = `mimabiao-${today}.txt`;
});

downloadBtn.addEventListener('click', async event => {
  if (!rawBase64) return;
  const filename = downloadBtn.download || 'mimabiao.txt';

  const useHash = $query("#enable-hash").checked;
  const useEncrypt = enableEncrypt.checked;
  let password = "";
  if (useEncrypt) {
    const pw = $query("#encrypt-password").value;
    const pw2 = $query("#encrypt-password-confirm").value;
    if (!pw) { alert("请输入加密密码"); event.preventDefault(); return; }
    if (pw !== pw2) { alert("两次输入的密码不一致"); event.preventDefault(); return; }
    password = pw;
  }

  try {
    const exported = await exportMimabiao(rawBase64, useHash, useEncrypt, password);
    const content = JSON.stringify(exported, null, 2);
    if (window.AndroidSave) {
      event.preventDefault();
      event.stopPropagation();
      AndroidSave.saveText(filename, content);
    }
  } catch (err) {
    alert("导出失败：" + err.message);
    event.preventDefault();
  }
});

  </script>

</body>
</html>
